# Claude GitLab CI + Mentu Integration
#
# This pipeline enables Claude agents triggered by GitLab events,
# with full accountability tracking via Mentu.
#
# Triggers:
#   - Merge request events (open, update)
#   - Manual pipeline runs with AI_FLOW_INPUT variable

stages:
  - ai

variables:
  GIT_STRATEGY: fetch

# Main Claude execution job
claude:
  stage: ai
  image: node:20-alpine

  rules:
    # Trigger on merge request events
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    # Allow manual triggers
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual

  variables:
    MENTU_ACTOR: "agent:claude-gitlab"
    MENTU_WORKSPACE: ".mentu"

  before_script:
    - apk add --no-cache jq
    - npm ci
    - npm run build
    - |
      if [ ! -f ".mentu/ledger.jsonl" ]; then
        ./dist/cli.js init
        echo "Mentu workspace initialized"
      fi

  script:
    - |
      # Sanitize MR title for shell safety (remove quotes and backticks)
      MR_TITLE="${CI_MERGE_REQUEST_TITLE:-Manual trigger}"
      SAFE_TITLE=$(echo "$MR_TITLE" | tr -d '`"' | head -c 200)
      MR_IID="${CI_MERGE_REQUEST_IID:-N/A}"

      # Capture the MR as a memory
      RESULT=$(./dist/cli.js capture "GitLab MR !${MR_IID}: ${SAFE_TITLE}" \
        --kind gitlab_mr \
        --actor agent:claude-gitlab \
        --json 2>/dev/null || echo '{"id":"capture_failed"}')

      MEM_ID=$(echo "$RESULT" | jq -r '.id // "none"')
      echo "Captured as memory: ${MEM_ID}"

      # Run Claude with the provided prompt (only for authorized runners)
      # AI_FLOW_INPUT is set via CI/CD variables by authorized users
      if [ -n "$AI_FLOW_INPUT" ]; then
        npx @anthropic-ai/claude-code \
          --print \
          --max-turns 50 \
          "$AI_FLOW_INPUT"
      else
        echo "No AI_FLOW_INPUT provided. Set this variable for manual runs."
        exit 0
      fi

  after_script:
    - |
      git config user.name "Claude GitLab Agent"
      git config user.email "claude-agent@mentu.dev"

      if git diff --quiet .mentu/; then
        echo "No ledger changes to commit"
      else
        git add .mentu/
        git commit -m "chore(mentu): update ledger from GitLab CI

Event: ${CI_PIPELINE_SOURCE}
MR: !${CI_MERGE_REQUEST_IID:-N/A}

Generated by Claude GitLab Agent" || true
        git push || echo "Push failed - may need manual sync"
      fi

  # Artifacts for debugging
  artifacts:
    paths:
      - .mentu/ledger.jsonl
    expire_in: 1 week
    when: always
